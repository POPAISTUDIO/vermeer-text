# Cree le bucket "code-interpreter-files" dans MinIO (idempotent).
# MinIO (image vanilla) ne cree pas de bucket par defaut -> ce Job le fait au
# premier deploiement. Rejouable sans risque (--ignore-existing).
apiVersion: batch/v1
kind: Job
metadata:
  name: vermeer-code-minio-makebucket
  namespace: llm
  labels:
    app.kubernetes.io/name: vermeer-code-minio-makebucket
    app.kubernetes.io/part-of: vermeer-code-interpreter
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vermeer-code-minio-makebucket
        app.kubernetes.io/part-of: vermeer-code-interpreter
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mc
          image: quay.io/minio/mc:latest      # a PINNER par digest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -e
              until mc alias set local http://vermeer-code-minio:9000 "$S3_ACCESS_KEY" "$S3_SECRET_KEY"; do
                echo "MinIO pas encore pret, nouvelle tentative..."; sleep 3
              done
              mc mb --ignore-existing local/code-interpreter-files
              echo "Bucket OK."
          env:
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: vermeer-code-interpreter-secrets
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: vermeer-code-interpreter-secrets
                  key: S3_SECRET_KEY
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false      # mc ecrit sa config dans $HOME
            capabilities:
              drop: ["ALL"]
