# Secrets de l'interpreteur, par REFERENCE uniquement (aucune valeur en clair).
# Calque sur le mecanisme existant du gitops (alpha/llm/external-secrets.yaml) :
# ClusterSecretStore "aws-parameter-store" -> AWS SSM Parameter Store.
#
# Oussama doit creer ces 4 parametres SSM AVANT deploiement (chemins a confirmer) :
#   /alpha/llm/code_interpreter_api_key       (cle d'auth /exec, cote interpreteur)
#   /alpha/llm/code_interpreter_master_key    (cle admin/CLI de l'image)
#   /alpha/llm/code_interpreter_s3_access_key (= MinIO root user en option (a))
#   /alpha/llm/code_interpreter_s3_secret_key (= MinIO root password en option (a))
#
# La meme cle (code_interpreter_api_key) doit etre reutilisee cote LibreChat pour
# construire LIBRECHAT_CODE_BASEURL (cf. README). Stocker idealement le BASEURL
# complet dans un 5e parametre injecte cote LibreChat (la cle y est embarquee).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vermeer-code-interpreter-secrets
  namespace: llm
  labels:
    app.kubernetes.io/name: vermeer-code-interpreter
    app.kubernetes.io/part-of: vermeer-code-interpreter
spec:
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: vermeer-code-interpreter-secrets   # Secret k8s genere, consomme par les pods
    creationPolicy: Owner
  data:
    - secretKey: API_KEY
      remoteRef:
        key: /alpha/llm/code_interpreter_api_key
    - secretKey: MASTER_API_KEY
      remoteRef:
        key: /alpha/llm/code_interpreter_master_key
    - secretKey: S3_ACCESS_KEY
      remoteRef:
        key: /alpha/llm/code_interpreter_s3_access_key
    - secretKey: S3_SECRET_KEY
      remoteRef:
        key: /alpha/llm/code_interpreter_s3_secret_key
