# =============================================================================
# SECRETS RAG — par RÉFÉRENCE uniquement (aucune valeur en clair)
# =============================================================================
# DRAFT de préparation — à relire/déployer par Oussama après la release.
#
# Calque sur le mécanisme existant du gitops (alpha/llm/external-secrets.yaml) :
# ClusterSecretStore "aws-parameter-store" -> AWS SSM Parameter Store.
#
# Oussama doit créer ce(s) paramètre(s) SSM AVANT déploiement (chemins à confirmer,
# alignés sur la convention /alpha/llm/... du package L2) :
#   /alpha/llm/rag_vectordb_password    (mot de passe pgvector)
#   /alpha/llm/rag_openai_api_key       (OPTIONNEL — clé embeddings dédiée, cf. note 2)
# =============================================================================


# --- 1) Mot de passe pgvector (REQUIS pour OPTION a in-cluster) --------------
# Provisionne le Secret k8s `librechat-vectordb` consommé par la sous-dépendance
# bitnami postgresql (values-rag.yaml -> postgresql.auth.existingSecret).
# Indispensable pour l'idempotence gitops (sinon le chart génère un mot de passe
# aléatoire régénéré à chaque render). Si OPTION (b) RDS : ce secret porte le
# mot de passe du user RDS au lieu du pod in-cluster (cf. README).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: librechat-vectordb
  namespace: llm
  labels:
    app.kubernetes.io/name: librechat-rag-vectordb
    app.kubernetes.io/part-of: vermeer-rag
spec:
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  refreshInterval: 1h
  target:
    name: librechat-vectordb   # Secret k8s généré, consommé par le pod pgvector
    creationPolicy: Owner
  data:
    # bitnami postgresql attend ces clés (cf. values-rag.yaml secretKeys).
    # La même valeur SSM alimente les 3 clés (réplication désactivée par défaut).
    - secretKey: postgres-password
      remoteRef:
        key: /alpha/llm/rag_vectordb_password
    - secretKey: password
      remoteRef:
        key: /alpha/llm/rag_vectordb_password
    - secretKey: replication-password
      remoteRef:
        key: /alpha/llm/rag_vectordb_password

